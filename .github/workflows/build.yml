name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-targets: 'aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-targets: 'x86_64-apple-darwin'
          - platform: windows-latest
            args: ''
            rust-targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Firewood ${{ github.ref_name }}'
          releaseBody: |
            ## 🐛 修复

            - 修复 macOS 下载后提示「已损坏，无法打开」的问题，启用 ad-hoc 代码签名

            ---

            ## 下载

            - **macOS (Apple Silicon)**: 下载 `firewood_x.x.x_aarch64.dmg`
            - **macOS (Intel)**: 下载 `firewood_x.x.x_x64.dmg`
            - **Windows**: 下载 `.exe` 安装包

            ## macOS 安装说明

            由于应用暂未通过 Apple 公证，首次打开需执行以下任一方式：

            **方式一（推荐）**：终端运行一行命令移除隔离标记后再打开
            ```bash
            xattr -cr /Applications/Firewood.app
            ```

            **方式二**：点击打开提示风险之后, 前往系统设置 -> 隐私与安全性 -> 找到 Firewood, 点击"仍要打开"按钮
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
