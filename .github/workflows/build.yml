name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Firewood ${{ github.ref_name }}'
          releaseBody: |
            ## ✨ 新功能

            - Firewood 菜单新增 About Firewood 入口，并改为应用内自定义 About 弹窗
            - 新增手动触发更新检查入口（菜单触发）

            ## 🐛 修复

            - 补回 Firewood 菜单中缺失的 About Firewood 子项

            ## 🔧 优化

            - About 面板视觉与排版优化，补充项目简介与版本信息展示
            - Updater 支持手动检查时的成功/失败反馈提示

            ## 📦 其他

            - CI 构建环境升级到 Node 24

            ---

            ## 下载

            - **macOS**: 下载 `firewood_x.x.x_universal.dmg`（支持 Intel & Apple Silicon）
            - **Windows**: 下载 `.msi` 或 `.exe` 安装包

            ## macOS 安装说明

            由于应用暂未通过 Apple 公证，首次打开需执行以下任一方式：

            **方式一（推荐）**：终端运行一行命令移除隔离标记后再打开
            ```bash
            xattr -cr /Applications/Firewood.app
            ```

            **方式二**：右键点击 App → 选择「打开」→ 弹窗中点「打开」
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
