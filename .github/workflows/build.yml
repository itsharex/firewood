name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Firewood ${{ github.ref_name }}'
          releaseBody: |
            ## ✨ 新功能

            - 文本 Diff 工具新增“恢复编辑视图”能力，可从结果页一键回到原文/修改后双栏编辑状态

            ## 🔧 优化

            - 文本 Diff 结果采用分块展示，新增行与删除行高亮更聚焦
            - 未变化内容改为默认折叠并支持按块展开/收起，减少长文本平铺干扰
            - 差异统计从“块数量”优化为“行数量”，信息更直观

            ---

            ## 下载

            - **macOS**: 下载 `firewood_x.x.x_universal.dmg`（支持 Intel & Apple Silicon）
            - **Windows**: 下载 `.msi` 或 `.exe` 安装包

            ## macOS 安装说明

            由于应用暂未通过 Apple 公证，首次打开需执行以下任一方式：

            **方式一（推荐）**：终端运行一行命令移除隔离标记后再打开
            ```bash
            xattr -cr /Applications/Firewood.app
            ```

            **方式二**：右键点击 App → 选择「打开」→ 弹窗中点「打开」
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
