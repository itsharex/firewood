name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Firewood ${{ github.ref_name }}'
          releaseBody: |
            ## ✨ 新功能

            ### 系统托盘支持
            - macOS 顶部状态栏现在会显示 Firewood 图标
            - 点击状态栏图标可快速显示/聚焦应用窗口
            - 右键状态栏图标可选择「Show Window」或「Quit」

            ### 关闭行为优化
            - 点击窗口关闭按钮不再退出应用，而是最小化到后台
            - 可通过状态栏图标或 Dock 图标重新打开窗口

            ### 图标更新
            - 替换为全新设计的应用图标：深色圆角背景 + 简洁火焰图形

            ---

            ## 下载

            - **macOS**: 下载 `firewood_x.x.x_universal.dmg`（支持 Intel & Apple Silicon）
            - **Windows**: 下载 `.msi` 或 `.exe` 安装包

            ## macOS 安装说明

            由于应用暂未通过 Apple 公证，首次打开需执行以下任一方式：

            **方式一（推荐）**：终端运行一行命令移除隔离标记后再打开
            ```bash
            xattr -cr /Applications/Firewood.app
            ```

            **方式二**：右键点击 App → 选择「打开」→ 弹窗中点「打开」
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
